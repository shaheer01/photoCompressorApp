<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
</head>
<body>
    <h1>Simple Login Test</h1>
    <button id="testBtn">Test Login Modal</button>
    
    <!-- Login Modal -->
    <div id="loginModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999;">
        <div style="background: white; margin: 50px auto; padding: 20px; width: 400px; border-radius: 8px;">
            <h2>Login Modal Works!</h2>
            <p>If you can see this, the modal system is working.</p>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        console.log('Simple test script loaded');
        
        function openLoginModal() {
            console.log('Opening modal...');
            document.getElementById('loginModal').style.display = 'flex';
        }
        
        function closeModal() {
            console.log('Closing modal...');
            document.getElementById('loginModal').style.display = 'none';
        }
        
        // Test button
        document.getElementById('testBtn').onclick = function() {
            console.log('Test button clicked');
            openLoginModal();
        };
        
        console.log('Test setup complete');
    </script>
</body>
</html>
