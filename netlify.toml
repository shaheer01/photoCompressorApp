[build]
  # Build command - since this is a static site, no build needed
  command = "echo 'Static site - no build required'"
  
  # Publish directory - root directory contains the static files
  publish = "."

# Redirect rules for SPA behavior

# Dashboard subdomain - route to analytics page
[[redirects]]
  from = "/*"
  to = "/analytics.html"
  status = 200
  force = true
  conditions = {Host = ["dashboard.compressphotos.cloud"]}

[[redirects]]
  from = "/analytics"
  to = "/analytics.html"
  status = 200

