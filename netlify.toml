[build]
  # Build command - since this is a static site, no build needed
  command = "echo 'Static site - no build required'"
  
  # Publish directory - root directory contains the static files
  publish = "."

# Redirect rules for SPA behavior
[[redirects]]
  from = "/analytics"
  to = "/analytics.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Performance headers
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Content Security Policy for AdSense
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://tpc.googlesyndication.com https://cdnjs.cloudflare.com https://unpkg.com https://cdn.jsdelivr.net;
      img-src 'self' data: https: blob:;
      style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com;
      font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com;
      connect-src 'self' https://pagead2.googlesyndication.com https://ipapi.co https://883f1947c43d.ngrok-free.app;
      frame-src https://tpc.googlesyndication.com https://googleads.g.doubleclick.net;
    """

# Environment-specific settings
[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "development"

[context.branch-deploy.environment]
  NODE_ENV = "development"

# Form handling (if you add contact forms later)
[forms]
  spam_filter = true
  
# Functions directory (for future serverless functions)
[functions]
  directory = "functions"