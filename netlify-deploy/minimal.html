<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Upload Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .upload-area { 
            border: 2px dashed #ccc; 
            padding: 40px; 
            text-align: center; 
            cursor: pointer;
            margin: 20px 0;
        }
        .upload-area:hover { border-color: #007cba; }
        button { 
            padding: 10px 20px; 
            background: #007cba; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 4px;
        }
        button:hover { background: #005a87; }
    </style>
</head>
<body>
    <h1>CompressPhotos - Upload Test</h1>
    
    <div class="upload-area" id="uploadArea">
        <p>📁 Click here or drag files to upload</p>
        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
        <br><br>
        <button id="browseBtn">Browse Files</button>
    </div>

    <div id="results"></div>

    <script>
        console.log('🚀 Script started');
        
        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ DOM ready');
            
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const browseBtn = document.getElementById('browseBtn');
            const results = document.getElementById('results');
            
            console.log('Elements found:', {
                uploadArea: !!uploadArea,
                fileInput: !!fileInput,
                browseBtn: !!browseBtn
            });
            
            // Browse button click
            browseBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                console.log('🖱️ Browse button clicked');
                fileInput.click();
            });
            
            // Upload area click
            uploadArea.addEventListener('click', function(e) {
                if (e.target !== browseBtn) {
                    console.log('📁 Upload area clicked');
                    fileInput.click();
                }
            });
            
            // File selection
            fileInput.addEventListener('change', function(e) {
                const files = e.target.files;
                console.log('📂 Files selected:', files.length);
                
                results.innerHTML = '<h3>Files Selected:</h3>';
                for (let i = 0; i < files.length; i++) {
                    results.innerHTML += `<p>${files[i].name} (${(files[i].size / 1024 / 1024).toFixed(2)} MB)</p>`;
                }
            });
            
            console.log('✅ All event listeners added');
        });
    </script>
</body>
</html>
