<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompressPhotos - Working Upload</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #2563eb;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        
        .upload-area {
            border: 3px dashed #cbd5e1;
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            background: #f8fafc;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 30px;
        }
        
        .upload-area:hover, .upload-area.dragover {
            border-color: #2563eb;
            background: #eff6ff;
        }
        
        .upload-area i {
            font-size: 48px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        
        .upload-area h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #1e293b;
        }
        
        .upload-area p {
            color: #64748b;
            margin-bottom: 30px;
        }
        
        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        
        .privacy-notice {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            padding: 12px 16px;
            background: #f0f9ff;
            border: 1px solid #e0f2fe;
            border-radius: 8px;
            font-size: 14px;
            color: #0369a1;
            font-weight: 500;
        }
        
        .privacy-notice i {
            color: #0ea5e9;
            font-size: 16px;
        }
        
        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 12px;
            display: none;
        }
        
        .file-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-pending { background: #fbbf24; }
        .status-processing { background: #3b82f6; animation: spin 1s linear infinite; }
        .status-completed { background: #10b981; color: white; }
        .status-error { background: #ef4444; color: white; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-images"></i> CompressPhotos</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-content">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Drag & Drop Your Images Here</h3>
                <p>Or click to browse files</p>
                <input type="file" id="fileInput" multiple accept="image/jpeg,image/jpg,.jpg,.jpeg" hidden>
                <button class="btn-primary" id="browseBtn">
                    <i class="fas fa-folder-open"></i>
                    Browse Files
                </button>
                <div class="privacy-notice">
                    <i class="fas fa-shield-alt"></i>
                    <span>Your images are processed locally in your browser for privacy</span>
                </div>
            </div>
        </div>
        
        <div class="results" id="results">
            <h3>Processing Results</h3>
            <div id="fileList"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
    <script>
        console.log('🚀 Simple upload page loaded');
        
        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const browseBtn = document.getElementById('browseBtn');
        const results = document.getElementById('results');
        const fileList = document.getElementById('fileList');
        
        // Event Listeners
        browseBtn.addEventListener('click', () => {
            console.log('✅ Browse button clicked');
            fileInput.click();
        });
        
        uploadArea.addEventListener('click', (e) => {
            if (e.target !== browseBtn && !browseBtn.contains(e.target)) {
                console.log('✅ Upload area clicked');
                fileInput.click();
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            console.log('✅ Files selected:', files.length);
            if (files.length > 0) {
                processFiles(files);
            }
        });
        
        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            console.log('✅ Files dropped:', files.length);
            processFiles(files);
        });
        
        // File Processing
        function processFiles(files) {
            console.log('Processing files:', files.length);
            results.style.display = 'block';
            fileList.innerHTML = '';
            
            files.forEach((file, index) => {
                if (file.type.match(/image\/jpe?g/)) {
                    processFile(file, index);
                } else {
                    console.log('Skipping non-JPEG file:', file.name);
                }
            });
        }
        
        function processFile(file, index) {
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.innerHTML = `
                <div class="file-info">
                    <div class="status-icon status-pending" id="status-${index}">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div>
                        <div><strong>${file.name}</strong></div>
                        <div>Original: ${formatFileSize(file.size)}</div>
                    </div>
                </div>
                <div id="result-${index}">Processing...</div>
            `;
            fileList.appendChild(fileItem);
            
            // Update status to processing
            setTimeout(() => {
                const statusIcon = document.getElementById(`status-${index}`);
                statusIcon.className = 'status-icon status-processing';
                statusIcon.innerHTML = '<i class="fas fa-spinner"></i>';
                
                // Compress the file
                compressImage(file, index);
            }, 100);
        }
        
        function compressImage(file, index) {
            console.log('Compressing:', file.name);
            
            new Compressor(file, {
                quality: 0.8,
                success: (compressedFile) => {
                    console.log('✅ Compression successful:', file.name);
                    
                    const statusIcon = document.getElementById(`status-${index}`);
                    const result = document.getElementById(`result-${index}`);
                    
                    statusIcon.className = 'status-icon status-completed';
                    statusIcon.innerHTML = '<i class="fas fa-check"></i>';
                    
                    const savings = ((file.size - compressedFile.size) / file.size * 100).toFixed(1);
                    result.innerHTML = `
                        <div>Compressed: ${formatFileSize(compressedFile.size)}</div>
                        <div style="color: #10b981; font-weight: bold;">${savings}% smaller</div>
                        <button class="btn-primary" onclick="downloadFile('${file.name}', ${index})" style="margin-top: 10px; padding: 6px 12px; font-size: 12px;">
                            <i class="fas fa-download"></i> Download
                        </button>
                    `;
                    
                    // Store compressed file for download
                    window[`compressed_${index}`] = compressedFile;
                },
                error: (error) => {
                    console.error('❌ Compression failed:', error);
                    
                    const statusIcon = document.getElementById(`status-${index}`);
                    const result = document.getElementById(`result-${index}`);
                    
                    statusIcon.className = 'status-icon status-error';
                    statusIcon.innerHTML = '<i class="fas fa-times"></i>';
                    
                    result.innerHTML = `<div style="color: #ef4444;">Compression failed</div>`;
                }
            });
        }
        
        function downloadFile(originalName, index) {
            const compressedFile = window[`compressed_${index}`];
            if (!compressedFile) return;
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(compressedFile);
            link.download = `compressed_${originalName}`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            console.log('✅ File downloaded:', originalName);
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        console.log('✅ All event listeners set up successfully');
    </script>
</body>
</html>
